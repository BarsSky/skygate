services:
  # 2026-07-14: Этап 14 v2 — Tailscale in-image (no sidecar).
  #
  # The skygate container runs tailscaled in its own network
  # namespace and joins the tailnet with `tailscale up --accept-routes`.
  # The relay (a separate node, e.g. emilia) advertises the Telegram
  # IP ranges as subnet routes; skygate accepts them, so
  # api.telegram.org traffic flows through the relay while
  # headscale (which is on the tailnet) stays direct.
  #
  # Required capabilities for the in-image tailscaled:
  #   - NET_ADMIN: manipulate routing tables / iptables
  #   - SYS_ADMIN: mount /dev/net/tun (some kernels also need this)
  #   - /dev/net/tun: the TUN device tailscale0 lives on
  #
  # To disable Tailscale entirely (non-RF deployments, testing,
  # local dev), just remove the TS_AUTHKEY_FILE env var and the
  # secrets: mount — the entrypoint will skip tailscaled and
  # skygate will use direct internet.
  skygate:
    build: .
    container_name: skygate
    env_file:
      - .env
    environment:
      - SKYGATE_DB=/data/skygate.db
      # Tailscale config. All three are optional; if TS_AUTHKEY_FILE
      # is unset the entrypoint skips tailscaled entirely.
      - TS_AUTHKEY_FILE=/run/secrets/ts_authkey
      - TS_LOGIN_SERVER=https://head.skynas.ru
      - TS_HOSTNAME=skygate-vm
    volumes:
      # Bind-mount source code - any change is picked up on container restart
      - ./:/app
      # Named volume for DB only
      - skygate-data:/data
      # docker.sock to call headscale CLI for preauth keys
      - /var/run/docker.sock:/var/run/docker.sock
      # Tailscale state dir. Persists across container restarts so we
      # don't re-auth on every `docker compose restart`. The
      # tailscaled.state file holds the node key; losing it forces
      # a re-auth (and a new preauth key from headscale).
      - ./data/ts:/var/lib/tailscale
      # Bind-mount the control socket path so tailscale CLI can
      # talk to tailscaled. Not strictly required (tailscale finds
      # the socket via /var/run/tailscale), but explicit.
      - ./data/ts/run:/var/run/tailscale
    secrets:
      - ts_authkey
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun
    # 2026-07-15: v0.15.0 — when the Caddy sidecar handles
    # TLS, the :8080 listener doesn't need to be on the
    # host's public interface. We still keep the bind
    # (Caddy forwards here) but the operator can opt to
    # remove the ports line below if they only want
    # Caddy to expose the dashboard. Leaving it bound
    # is the safer default (allows `curl localhost:8080`
    # from the host for ad-hoc debugging).
    ports:
      - "8080:8080"
    networks:
      - skygate-net
    restart: unless-stopped

  # 2026-07-15: v0.15.0 — Caddy sidecar.
  # TLS-terminating reverse proxy for all public-facing
  # modules. Auto-issues Let's Encrypt certs via DNS-01
  # (no port-80 inbound required; works on private subnets).
  # Per-hostname routing in the rendered Caddyfile
  # (deploy/templates/Caddyfile.tmpl): head.* routes to
  # skygate+headscale, headplane.* to headplane, derp.* to
  # the derper container.
  #
  # To skip Caddy entirely, set CADDY_ENABLED=false in .env.
  # The deploy script then omits the Caddyfile render and
  # this service is left in the compose but is a no-op
  # (use a different compose override or remove the
  # service from the file). Caddy uses the same Docker
  # network as skygate/headscale/headplane so the
  # reverse_proxy directives can resolve them by name.
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    # :80 is the HTTP-01 challenge port; :443 is the
    # HTTPS port. Operators behind Cloudflare should
    # also enable proxy (orange cloud) so Caddy sees
    # the real client IP.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Rendered Caddyfile (deploy.sh writes this).
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Cert + ACME account state. Caddy stores certs
      # under /data by default; persisting this on the
      # host means the next start doesn't re-issue.
      - caddy-data:/data
      # ACME account config (Caddy writes this on first
      # ACME registration; persisting means the rate
      # limit on Let's Encrypt isn't hit on every
      # restart).
      - caddy-config:/config
    # 2026-07-15: v0.15.0 — env_file. The deploy
    # script writes a Caddy-specific .env with the
    # DNS-01 API token (and only the token — the
    # operator's main .env, which is often committed
    # to git, is not touched). The rendered Caddyfile
    # references the token via env.CADDY_DNS_TOKEN_VALUE.
    env_file:
      - ./caddy/caddy.env
    networks:
      - skygate-net
    depends_on:
      - skygate

networks:
  skygate-net:
    name: headscale_default
    external: true

volumes:
  skygate-data:
    name: skygate-data
  caddy-data:
    name: caddy-data
  caddy-config:
    name: caddy-config

secrets:
  ts_authkey:
    file: ./secrets/ts_authkey
